
services:
  grey:
    image: savagemunkee/grey:latest
    # Or build locally:
    # build: .
    container_name: grey
    restart: unless-stopped
    volumes:
      - ./config.yaml:/etc/grey/config.yaml:ro
      # Mount host log directories so grey can tail them.
      - /var/log/nginx:/var/log/nginx:ro
      - /var/log/app:/var/log/app:ro
    ports:
      - "9101:9101"

  # Optional: scrape grey metrics with Prometheus.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - grey
